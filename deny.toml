# ==================================================================================================================== #
# cargo-deny - Workspace
#
# @see: https://embarkstudios.github.io/cargo-deny
# @see: https://spdx.org/licenses
#
# ==================================================================================================================== #
# Root (Output, graph, etc)

[output]
feature-depth = 1

[graph]
all-features = false
targets = []

# ==================================================================================================================== #
# Advisories

[advisories]
unmaintained = "workspace"
yanked = "warn"

ignore = []

# ==================================================================================================================== #
# Licenses

[licenses]
unused-allowed-license = "warn"
confidence-threshold = 0.8

allow = [
    # Generic Open Source
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Zlib",
]

[licenses.private]
ignore = true

# ==================================================================================================================== #
# Bans

[bans]
multiple-versions = "warn"
wildcards = "deny"

deny = []

[bans.workspace-dependencies]
duplicates = "allow"
unused = "warn"

# ==================================================================================================================== #
