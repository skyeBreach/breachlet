info:
  name: Health
  type: http
  seq: 1

http:
  method: GET
  url: "{{base-url}}/health"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "Status: Healthy"
    request:
      url: "{{base-url}}/health"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
        - name: content-length
          value: "38"
        - name: date
          value: Sat, 16 May 2026 14:47:19 GMT
      body:
        type: json
        data: |-
          {
            "status": "healthy",
            "version": "0.1.0"
          }
