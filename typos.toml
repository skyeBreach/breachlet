# ==================================================================================================================== #
# Typos - Workspace
#
# Configuration for typos-cli spell checking across the project.
#
#==================================================================================================================== #
# Defaults

[default]
extend-ignore-re = [
    # Ignore hex strings and hashes
    "\\b[0-9a-fA-F]{40,}\\b",
    # Ignore base64 strings
    "\\b[A-Za-z0-9+/]{40,}={0,2}\\b",
]

[default.extend-words]
# Repo Specific Words
breachlet = "breachlet"

# ==================================================================================================================== #
# Files

[files]
extend-exclude = [
    # Build Artifacts
    "target/",
]

# ==================================================================================================================== #
